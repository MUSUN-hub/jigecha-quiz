<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}
body{font-family:"Malgun Gothic","맑은 고딕",sans-serif;margin:0;background:#f4f6f9;color:#222;line-height:1.5;}
.wrap{display:flex;max-width:1200px;margin:0 auto;gap:20px;padding:20px;align-items:flex-start;}
.main{flex:1;min-width:0;}
header.top{background:linear-gradient(135deg,#ff8a00,#ff5722);color:#fff;padding:22px 26px;border-radius:14px;margin-bottom:16px;}
header.top h1{margin:0 0 6px;font-size:21px;}
header.top p{margin:0;font-size:13px;opacity:.95;}
.legend{margin:12px 0 18px;font-size:12px;color:#555;}

.q-card.freq{border-left-color:#ffb300;}
.q-num{font-weight:700;color:#ff5722;margin-right:6px;}
.q-text{font-size:15px;font-weight:600;margin-bottom:12px;}
.opt{display:block;width:100%;text-align:left;background:#f7f8fa;border:1.5px solid #e3e6ea;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;font-size:14px;transition:.15s;}
.opt:hover{background:#eef1f5;}
.opt.correct{background:#e6f7ea;border-color:#34a853;color:#1e7e34;font-weight:600;}
.opt.wrong{background:#fdecea;border-color:#e53935;color:#c62828;font-weight:600;}
.opt.disabled{cursor:default;}
.explain{margin-top:8px;font-size:13px;background:#f0f6ff;border:1px solid #cfe2ff;border-radius:8px;padding:9px 12px;color:#244;display:none;}
.explain.show{display:block;}
.side{width:260px;flex-shrink:0;position:sticky;top:20px;}

.score h2{margin:0 0 14px;font-size:16px;}
.ring{font-size:40px;font-weight:800;margin:6px 0;}

.row b.ok{color:#1e7e34;} .row b.no{color:#c62828;}
.result{margin-top:14px;padding:12px;border-radius:10px;font-size:18px;font-weight:800;background:#f1f3f5;color:#666;}
.result.pass{background:#e6f7ea;color:#1e7e34;}
.result.fail{background:#fdecea;color:#c62828;}
.small{font-size:12px;color:#888;margin-top:6px;}
.reset{margin-top:14px;width:100%;padding:10px;border:none;border-radius:8px;background:#ff5722;color:#fff;font-weight:700;cursor:pointer;font-size:14px;}
@media (max-width:880px){.wrap{flex-direction:column;}.side{width:100%;position:static;}}
</style></head><body>
<div class="wrap"><div class="main">
<header class="top"><h1>지게차운전기능사 필기 제9회 모의고사</h1><p>이밤새tv 제9회 기출복원 자막 기반 · 총 60문제 · 합격 60점(36문제↑) · 60분</p></header>

<script>

let answered=0,correct=0,wrong=0;
Q.forEach((item,idx)=>{
 const card=document.createElement('div');

 let badges='';

 item.o.forEach((opt,oi)=>{
  const b=document.createElement('button');

  card.appendChild(b);
 });

});
function choose(card,btn,item,oi){
 if(card.dataset.done) return; card.dataset.done=1;
 card.querySelectorAll('.opt').forEach((o,i)=>{o.classList.add('disabled'); if(i===item.a)o.classList.add('correct');});
 if(oi===item.a) correct++; else {btn.classList.add('wrong'); wrong++;}
 answered++; card.querySelector('.explain').classList.add('show'); update();
}
function update(){
 document.getElementById('answered').textContent=answered;
 document.getElementById('correct').textContent=correct;
 document.getElementById('wrong').textContent=wrong;
 document.getElementById('pts').textContent=Math.round(correct/60*100);
 const r=document.getElementById('result');
 if(answered===0){r.textContent='진행 중';r.className='result';return;}
 if(correct>=36){r.textContent='✅ 합격';r.className='result pass';}
 else if(answered===60){r.textContent='❌ 불합격';r.className='result fail';}
 else if(36-correct>60-answered){r.textContent='❌ 불합격 확정';r.className='result fail';}

}
