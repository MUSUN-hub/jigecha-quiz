<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지게차운전기능사 필기 제1회 모의고사 (이밤새tv 기출복원)</title>
<style>
  * { box-sizing: border-box; }
  body { font-family:"Malgun Gothic","맑은 고딕",sans-serif; margin:0; background:#f4f6f9; color:#222; line-height:1.5; }
  .wrap { display:flex; max-width:1200px; margin:0 auto; gap:20px; padding:20px; align-items:flex-start; }
  .main { flex:1; min-width:0; }
  header.top { background:linear-gradient(135deg,#ff8a00,#ff5722); color:#fff; padding:22px 26px; border-radius:14px; margin-bottom:16px; }
  header.top h1 { margin:0 0 6px; font-size:21px; }
  header.top p { margin:0; font-size:13px; opacity:.95; }
  .legend { margin:12px 0 18px; font-size:12px; color:#555; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; margin-right:4px; }
  .b-freq { background:#fff3cd; color:#b8860b; border:1px solid #ffe08a; }
  .b-imp  { background:#ffe0e0; color:#d32f2f; border:1px solid #ffb3b3; }
  .q-card { background:#fff; border-radius:12px; padding:18px 20px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,.06); border-left:5px solid transparent; }
  .q-card.imp { border-left-color:#d32f2f; }
  .q-card.freq { border-left-color:#ffb300; }
  .q-num { font-weight:700; color:#ff5722; margin-right:6px; }
  .q-text { font-size:15px; font-weight:600; margin-bottom:12px; }
  .opt { display:block; width:100%; text-align:left; background:#f7f8fa; border:1.5px solid #e3e6ea; border-radius:8px; padding:10px 12px; margin-bottom:8px; cursor:pointer; font-size:14px; transition:.15s; }
  .opt:hover { background:#eef1f5; }
  .opt.correct { background:#e6f7ea; border-color:#34a853; color:#1e7e34; font-weight:600; }
  .opt.wrong { background:#fdecea; border-color:#e53935; color:#c62828; font-weight:600; }
  .opt.disabled { cursor:default; }
  .explain { margin-top:8px; font-size:13px; background:#f0f6ff; border:1px solid #cfe2ff; border-radius:8px; padding:9px 12px; color:#244; display:none; }
  .explain.show { display:block; }
  .side { width:260px; flex-shrink:0; position:sticky; top:20px; }
  .score { background:#fff; border-radius:14px; padding:20px; box-shadow:0 2px 10px rgba(0,0,0,.08); text-align:center; }
  .score h2 { margin:0 0 14px; font-size:16px; }
  .ring { font-size:40px; font-weight:800; margin:6px 0; }
  .row { display:flex; justify-content:space-between; font-size:14px; padding:7px 4px; border-bottom:1px dashed #eee; }
  .row b.ok { color:#1e7e34; } .row b.no { color:#c62828; }
  .result { margin-top:14px; padding:12px; border-radius:10px; font-size:18px; font-weight:800; background:#f1f3f5; color:#666; }
  .result.pass { background:#e6f7ea; color:#1e7e34; }
  .result.fail { background:#fdecea; color:#c62828; }
  .small { font-size:12px; color:#888; margin-top:6px; }
  .reset { margin-top:14px; width:100%; padding:10px; border:none; border-radius:8px; background:#ff5722; color:#fff; font-weight:700; cursor:pointer; font-size:14px; }
  @media (max-width:880px){ .wrap{flex-direction:column;} .side{width:100%;position:static;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="main">
    <header class="top">
      <h1>🚜 지게차운전기능사 필기 제1회 모의고사</h1>
      <p>이밤새tv 제1회 기출복원 자막 기반 · 총 60문제 · 합격 60점(36문제↑) · 60분</p>
    </header>
    <div class="legend">
      <span class="badge b-freq">자주출제</span> 영상에서 기출·빈출로 언급된 문제 &nbsp;
      <span class="badge b-imp">중요</span> 꼭 외워야 하는 핵심 문제
    </div>
    <div id="quiz"></div>
  </div>
  <div class="side">
    <div class="score">
      <h2>📊 채점 현황</h2>
      <div class="ring"><span id="answered">0</span> / 60</div>
      <div class="row"><span>✅ 맞은 개수</span><b class="ok" id="correct">0</b></div>
      <div class="row"><span>❌ 틀린 개수</span><b class="no" id="wrong">0</b></div>
      <div class="row"><span>📝 점수</span><b id="pts">0</b>점</div>
      <div class="result" id="result">진행 중</div>
      <div class="small">36문제(60점) 이상 → 합격</div>
      <button class="reset" onclick="location.reload()">다시 풀기</button>
    </div>
  </div>
</div>
<script>
const Q = [
 {q:"지게차의 일반적인 조향 방식으로 알맞은 것은?",o:["앞바퀴 조향 방식","후륜구동·후륜조향 방식","뒷바퀴 조향 방식","사륜 조향 방식"],a:2,e:"지게차는 앞바퀴로 구동, 뒷바퀴로 방향전환(후륜 조향)한다. 거의 매 시험마다 출제.",f:1,i:1},
 {q:"지게차 마스트의 구조 및 기능과 관련된 구성 요소가 아닌 것은?",o:["틸트 실린더","백레스트","리프트 실린더","카운터웨이트"],a:3,e:"카운터웨이트는 차체 후면의 평형추로, 마스트 구성요소가 아니다.",f:0,i:1},
 {q:"카운터밸런스형 지게차 마스트의 일반적인 경사각으로 가장 적절한 것은?",o:["전경각 5~6°, 후경각 10~12°","전경각 10~12°, 후경각 5~6°","전경각 5° 이내, 후경각 5° 이내","전경각 15°, 후경각 20°"],a:0,e:"카운터밸런스형은 전경 5~6°, 후경 10~12°. (사이드포크형은 전·후경 모두 5° 이내)",f:0,i:0},
 {q:"포크를 앞으로 밀거나 뒤로 끌어당겨 화물을 적재·운반할 수 있는 작업장치는?",o:["로테이팅 포크","푸시풀","힌지드 포크","스키드 포크"],a:1,e:"푸시풀은 백레스트 하단에 부착되어 화물을 밀거나 끌어당긴다.",f:0,i:0},
 {q:"지게차 조종석 계기판에 일반적으로 표시되지 않는 항목은?",o:["냉각수 온도계","배터리 경고등","아워미터","실린더 압력계"],a:3,e:"실린더 압력계는 정비 점검 시 확인하며 운전 계기판에는 없다.",f:0,i:0},
 {q:"브레이크 오일의 구비 조건으로 적절하지 않은 것은?",o:["비등점이 높아 베이퍼록을 일으키지 않을 것","알맞은 점도를 가지고 온도에 대한 점도 변화가 작을 것","윤활성이 있을 것","빙점이 낮고 인화점이 낮을 것"],a:3,e:"인화점은 높아야 한다. 비등점·인화점은 높고, 빙점은 낮아야 한다.",f:0,i:1},
 {q:"산업안전보건기준 규칙상 지게차 작업 시 반드시 유도자를 배치해야 하는 상황이 아닌 것은?",o:["하역운반기계가 넘어져 근로자에게 위험이 미칠 우려가 있는 경우","하역운반 작업 장소의 경사도가 5%가 넘는 경우","지반의 붕괴 위험이 있는 경우","하역운반기계·화물에 근로자가 접촉하여 위험해질 우려가 있는 장소"],a:1,e:"경사도 5% 기준의 유도자 배치 규정은 없다. 나머지는 규칙 제40조 규정 사항.",f:0,i:0},
 {q:"지게차를 주차할 때 안전 사항으로 가장 부적절한 것은?",o:["마스트를 전방으로 틸트하고 포크는 지면에 완전히 내려놓는다","키 스위치는 OFF로 하고 주차 브레이크를 고정시킨다","통로나 비상구에는 주차하지 않는다","경사진 곳에 주차할 때는 마스트를 뒤로 틸트하고 포크는 약간 올려둔다"],a:3,e:"지게차는 경사지에 주차하지 않는 것이 원칙. 작년 마지막 시험 기출.",f:1,i:0},
 {q:"엔진에서 피스톤의 행정(行程)이란 무엇인가?",o:["상사점과 하사점 사이의 길이(거리)","상사점과 하사점 사이의 총 면적","실린더 벽의 상하 길이","피스톤의 길이"],a:0,e:"행정은 상사점~하사점 사이 피스톤의 운동 거리이다.",f:0,i:1},
 {q:"실린더 내경보다 피스톤 행정이 더 작은 단행정 엔진에 대한 설명으로 알맞은 것은?",o:["엔진의 높이를 낮게 할 수 있다","엔진의 높이를 높게 해야 한다","실린더 내경이 작아 엔진 길이가 짧다","피스톤 과열이 거의 없다"],a:0,e:"단행정 엔진은 높이를 낮게 할 수 있고 출력 증대에 유리하나, 길이는 길어진다.",f:0,i:0},
 {q:"커넥팅 로드의 길이가 길어질 경우 나타나는 현상으로 관계가 없는 것은?",o:["측압이 작아진다","실린더 마멸이 감소한다","엔진의 높이가 낮아진다","엔진이 무거워진다"],a:2,e:"로드가 길어지면 엔진 높이는 오히려 높아진다.",f:0,i:0},
 {q:"다음 윤활 방식 중 오일 펌프로 급유하는 방식은?",o:["압송식","비산식","비산압송식","분무식"],a:0,e:"압송식은 오일펌프로 가압하여 강제 급유한다. 비산식은 직접 뿌리는 방식.",f:0,i:0},
 {q:"4행정으로 1사이클을 완성하는 엔진에서 각 행정의 순서는?",o:["압축→흡입→동력→배기","흡입→동력→압축→배기","배기→압축→흡입→동력","흡입→압축→폭발(동력)→배기"],a:3,e:"흡입-압축-폭발(동력)-배기 순으로 1사이클을 완성한다.",f:0,i:1},
 {q:"점도 지수가 큰 엔진 오일은 온도 변화에 따라 점도가 어떻게 변하는가?",o:["크다","작다","변화 없다","불규칙하다"],a:1,e:"점도지수가 높으면 온도 변화에 따른 점도 변화가 작다.",f:0,i:1},
 {q:"엔진의 구동 벨트(팬벨트) 장력이 너무 느슨할 때 발생할 수 있는 현상은?",o:["엔진 출력이 증가한다","충전 부족 현상이 발생한다","냉각수가 동결된다","연료 소비가 감소한다"],a:1,e:"벨트가 느슨하면 엔진 과열과 충전 부족 현상이 발생한다.",f:0,i:0},
 {q:"엔진에서 공기청정기(에어클리너)를 설치하는 목적으로 가장 적절한 것은?",o:["연료를 여과한다","냉각수를 정화한다","배기가스를 정화한다","흡입 공기의 여과와 소음을 방지한다"],a:3,e:"공기청정기는 흡입공기 여과와 소음 감소가 목적이다.",f:0,i:0},
 {q:"다음 중 착화성이 가장 좋은 연료는?",o:["가솔린","경유","중유","등유"],a:1,e:"착화점이 낮을수록 착화성이 좋다. 경유(약 350℃)가 가장 좋다.",f:0,i:0},
 {q:"디젤 기관에서 노크 방지 방법으로 적절하지 않은 것은?",o:["압축비를 높게 한다","연료 입자를 미립화시킨다","연소실 내 온도를 높인다","착화 온도가 높은 연료를 사용한다"],a:3,e:"착화 온도가 낮은(세탄가 높은) 연료를 써야 노크가 방지된다.",f:1,i:0},
 {q:"디젤 기관에서 분사 노즐의 기능·구비 조건에 대한 설명으로 부적절한 것은?",o:["고압의 연료를 분사 압력으로 기화시켜 분사한다","연료를 미세한 안개 모양으로 미립화시켜 착화를 쉽게 한다","분무를 연소실 구석구석까지 뿌려지게 한다","고온·고압의 가혹한 조건에서도 장시간 사용할 수 있어야 한다"],a:0,e:"기화가 아니라 미립화(작은 입자)시켜 분사하는 것이 맞다.",f:0,i:0},
 {q:"전기 회로에 전압이 12V이고 저항이 6Ω일 때 전류는 얼마인가?",o:["1A","2A","3A","6A"],a:1,e:"옴의 법칙: 전류=전압÷저항=12÷6=2A.",f:0,i:1},
 {q:"12V 납축전지 셀에 대한 설명으로 맞는 것은?",o:["여섯 개의 셀이 직렬로 접속되어 있다","여섯 개의 셀이 병렬로 접속되어 있다","두 개의 셀이 직렬로 접속되어 있다","열두 개의 셀이 병렬로 접속되어 있다"],a:0,e:"2V 셀 6개가 직렬 연결되어 12V가 된다.",f:0,i:1},
 {q:"축전지의 자기 방전 원인이 아닌 것은?",o:["전해액 중 불순물로 국부 전지가 형성됨","극판에서 떨어져 나간 물질에 의한 극판 단락","축전지 표면 불순물에 의한 전류 누설","전해액의 양이 많아져 용량이 커짐"],a:3,e:"전해액 양이 많아 용량이 커지는 것은 자기방전 원인이 아니다.",f:0,i:0},
 {q:"기관 시동 장치에서 링 기어를 회전시키는 구동 피니언은 어느 곳에 부착되어 있는가?",o:["변속기","클러치","시동 전동기","크랭크축"],a:2,e:"피니언은 시동 전동기에 부착되어 플라이휠 링기어와 맞물린다.",f:0,i:0},
 {q:"교류(AC) 발전기에서 전류가 발생되는 곳은?",o:["스테이터","로터","브러시","정류기"],a:0,e:"교류 발전기는 스테이터에서 전류가 발생한다. 매 시험 평균 2문제 출제.",f:1,i:1},
 {q:"일반적인 축전지 터미널의 식별법으로 적합하지 않은 것은?",o:["P는 양극, N은 음극","굵은 것이 양극, 가는 것이 음극","터미널의 요철로 구분한다","적색이 양극, 흑색이 음극"],a:2,e:"요철로는 구분하지 않는다. 굵기·색·기호(+/-, P/N)로 구분.",f:0,i:0},
 {q:"클러치 스프링의 장력이 약하면 일어날 수 있는 현상으로 가장 적합한 것은?",o:["동력 차단이 안 된다","클러치가 미끄러진다","변속이 전혀 안 된다","클러치 페달이 무거워진다"],a:1,e:"스프링 장력이 약하면 클러치가 미끄러져 동력 전달이 불량해진다. 작년 11·12월 2회 출제.",f:1,i:1},
 {q:"자동 변속기가 과열되는 원인이 아닌 것은?",o:["메인 압력이 높다","과부하 운전을 계속한다","변속기 오일 쿨러가 막혔다","오일 수준이 높다"],a:3,e:"오일 수준이 높은 것(과다)은 과열과 직접 연관이 없다.",f:1,i:0},

const quiz=document.getElementById('quiz');
let answered=0,correct=0,wrong=0;
Q.forEach((item,idx)=>{
  const card=document.createElement('div');
  card.className='q-card'+(item.i?' imp':(item.f?' freq':''));
  let badges='';
  if(item.f) badges+='<span class="badge b-freq">자주출제</span>';
  if(item.i) badges+='<span class="badge b-imp">중요</span>';
  card.innerHTML=`<div class="q-text"><span class="q-num">Q${idx+1}.</span>${badges} ${item.q}</div>`;
  item.o.forEach((opt,oi)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.textContent=`${oi+1}. ${opt}`;
    b.onclick=()=>choose(card,b,item,oi);
    card.appendChild(b);
  });
  const ex=document.createElement('div');
  ex.className='explain';
  ex.innerHTML=`💡 <b>정답: ${item.a+1}번</b> — ${item.e}`;
  card.appendChild(ex);
  quiz.appendChild(card);
});
function choose(card,btn,item,oi){
  if(card.dataset.done) return;
  card.dataset.done=1;
  card.querySelectorAll('.opt').forEach((o,i)=>{o.classList.add('disabled'); if(i===item.a)o.classList.add('correct');});
  if(oi===item.a) correct++; else {btn.classList.add('wrong'); wrong++;}
  answered++;
  card.querySelector('.explain').classList.add('show');
  update();
}
function update(){
  document.getElementById('answered').textContent=answered;
  document.getElementById('correct').textContent=correct;
  document.getElementById('wrong').textContent=wrong;
  document.getElementById('pts').textContent=Math.round(correct/60*100);
  const r=document.getElementById('result');
  if(answered===0){r.textContent='진행 중';r.className='result';return;}
  if(correct>=36){r.textContent='✅ 합격';r.className='result pass';}
  else if(answered===60){r.textContent='❌ 불합격';r.className='result fail';}
  else if(36-correct>60-answered){r.textContent='❌ 불합격 확정';r.className='result fail';}
  else{r.textContent='진행 중';r.className='result';}
}
